<!DOCTYPE html>
<html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Reset SuperTonic</title>
<style>body{font-family:-apple-system,sans-serif;background:#1c1b18;color:#e6e4dc;text-align:center;padding:60px 20px}h2{color:#8aad7a}.btn{display:inline-block;padding:16px 36px;background:#8aad7a;color:#fff;border-radius:12px;font-size:17px;font-weight:700;text-decoration:none;margin-top:20px}</style></head>
<body><h2>SuperTonic Reset</h2>
<p id="msg">Clearing old cache...</p>
<script>
(async () => {
  const regs = await navigator.serviceWorker.getRegistrations();
  for (const r of regs) await r.unregister();
  const keys = await caches.keys();
  for (const k of keys) await caches.delete(k);
  document.getElementById('msg').innerHTML = '✅ All clear!<br><small>Old cache and service worker removed.</small>';
  setTimeout(() => { location.href = './index.html?v=2'; }, 1500);
})();
</script>
<a class="btn" href="./index.html?v=2">→ Open SuperTonic</a>
</body></html>
